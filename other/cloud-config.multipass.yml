#cloud-config
users:
# NOTE: Using "ubuntu" user, because multipass's "mount" uses it.
- name: ubuntu
  ssh_authorized_keys:
  - '$(cat ~/.ssh/id_ed25519.pub)'
  shell: /bin/bash
  sudo: "ALL=(ALL) NOPASSWD:ALL"
package_update: true
packages:
- bash-completion
- curl
- dnsutils
- git
- gron
- htop
- jq
- less
- openvpn
- psmisc
- rsync
- socat
- tig
- wget
- wireguard
